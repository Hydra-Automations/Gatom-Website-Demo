<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<title>Gatom Energija</title>

<!-- Chat styles loaded FIRST so our :root overrides below take precedence -->
<link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    color: #222;
    background: #f7f7f7;
}

header {
    background: linear-gradient(120deg, #ff7a00, #ffb347);
    color: white;
    padding: 100px 20px;
    text-align: center;
}

header h1 {
    font-size: 44px;
    margin: 0;
}

header p {
    margin-top: 15px;
    font-size: 18px;
}

.btn {
    display: inline-block;
    margin-top: 25px;
    padding: 12px 28px;
    background: white;
    color: #ff7a00;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
}

section {
    max-width: 1100px;
    margin: 60px auto;
    padding: 0 20px;
}

h2 {
    text-align: center;
    margin-bottom: 30px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 10px;
}

.highlight {
    background: #ff7a00;
    color: white;
    text-align: center;
    padding: 60px 20px;
}

footer {
    background: #111;
    color: #aaa;
    text-align: center;
    padding: 30px;
}

/* ===== CHATBOT CSS =====
   These :root overrides are placed AFTER the n8n stylesheet link above,
   so they win in the cascade and will actually apply. */
:root {
	/* Colors */
	--chat--color--primary: #e74266;
	--chat--color--primary-shade-50: #db4061;
	--chat--color--primary--shade-100: #cf3c5c;
	--chat--color--secondary: #20b69e;
	--chat--color-secondary-shade-50: #1ca08a;
	--chat--color-white: #fff;
	--chat--color-light: #f2f4f8;
	--chat--color-light-shade-50: #e6e9f1;
	--chat--color-light-shade-100: #c2c5cc;
	--chat--color-medium: #d2d4d9;
	--chat--color-dark: #101330;
	--chat--color-disabled: #d2d4d9;
	--chat--color-typing: #404040;

	/* Base Layout */
	--chat--spacing: 1rem;
	--chat--border-radius: 0.25rem;
	--chat--transition-duration: 0.15s;
	--chat--font-family:
		-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen-Sans, Ubuntu, Cantarell,
		'Helvetica Neue', sans-serif;

	/* Window Dimensions */
	--chat--window--width: 400px;
	--chat--window--height: 600px;
	--chat--window--bottom: var(--chat--spacing);
	--chat--window--right: var(--chat--spacing);
	--chat--window--z-index: 9999;
	--chat--window--border: 1px solid var(--chat--color-light-shade-50);
	--chat--window--border-radius: 1rem;
	--chat--window--margin-bottom: var(--chat--spacing);

	/* Header Styles */
	--chat--header-height: auto;
	--chat--header--padding: var(--chat--spacing);
	--chat--header--background: #b34700;
	--chat--header--color: var(--chat--color-light);
	--chat--header--border-top: none;
	--chat--header--border-bottom: none;
	--chat--header--border-left: none;
	--chat--header--border-right: none;
	--chat--heading--font-size: 2em;
	--chat--subtitle--font-size: 1.5em;
	--chat--subtitle--line-height: 0;

	/* Message Styles */
	--chat--message--font-size: 0.9rem;
	--chat--message--padding: var(--chat--spacing);
	--chat--message--border-radius: var(--chat--border-radius);
	--chat--message-line-height: 1.4;
	--chat--message--margin-bottom: calc(var(--chat--spacing) * 1);
	--chat--message--bot--background: var(--chat--color-white);
	--chat--message--bot--color: var(--chat--color-dark);
	--chat--message--bot--border: none;
	--chat--message--user--background: var(--chat--color--secondary);
	--chat--message--user--color: var(--chat--color-white);
	--chat--message--user--border: none;
	--chat--message--pre--background: rgba(0, 0, 0, 0.05);
	--chat--messages-list--padding: var(--chat--spacing);

	/* Toggle Button */
	--chat--toggle--size: 64px;
	--chat--toggle--width: var(--chat--toggle--size);
	--chat--toggle--height: var(--chat--toggle--size);
	--chat--toggle--border-radius: 50%;
	--chat--toggle--background: var(--chat--color--primary);
	--chat--toggle--hover--background: var(--chat--color--primary-shade-50);
	--chat--toggle--active--background: var(--chat--color--primary--shade-100);
	--chat--toggle--color: var(--chat--color-white);

	/* Input Area */
	--chat--textarea--height: 50px;
	--chat--textarea--max-height: 30rem;
	--chat--input--font-size: inherit;
	--chat--input--border: 0;
	--chat--input--border-radius: 0;
	--chat--input--padding: 0.8rem;
	--chat--input--background: var(--chat--color-white);
	--chat--input--text-color: initial;
	--chat--input--line-height: 1.5;
	--chat--input--placeholder--font-size: var(--chat--input--font-size);
	--chat--input--border-active: 0;
	--chat--input--left--panel--width: 2rem;

	/* Button Styles */
	--chat--button--padding: calc(var(--chat--spacing) * 5 / 8) var(--chat--spacing);
	--chat--button--border-radius: var(--chat--border-radius);
	--chat--button--font-size: 1rem;
	--chat--button--line-height: 1;
	--chat--button--color--primary: var(--chat--color-light);
	--chat--button--background--primary: var(--chat--color--secondary);
	--chat--button--border--primary: none;
	--chat--button--color--primary--hover: var(--chat--color-light);
	--chat--button--background--primary--hover: var(--chat--color-secondary-shade-50);
	--chat--button--border--primary--hover: none;
	--chat--button--color--primary--disabled: var(--chat--color-light);
	--chat--button--background--primary--disabled: #81bbb1;
	--chat--button--border--primary--disabled: none;
	--chat--button--color--secondary: var(--chat--color-light);
	--chat--button--background--secondary: hsl(0, 0%, 58%);
	--chat--button--border--secondary: none;
	--chat--button--color--secondary--hover: var(--chat--color-light);
	--chat--button--background--secondary--hover: hsl(0, 0%, 51%);
	--chat--button--border--secondary--hover: none;
	--chat--button--color--secondary--disabled: var(--chat--color-light);
	--chat--button--background--secondary--disabled: hsl(0, 0%, 78%);
	--chat--button--border--secondary--disabled: none;
	--chat--close--button--color-hover: var(--chat--color--primary);

	/* Send and File Buttons */
	--chat--input--send--button--background: var(--chat--color-white);
	--chat--input--send--button--color: var(--chat--color--secondary);
	--chat--input--send--button--background-hover: var(--chat--color--primary-shade-50);
	--chat--input--send--button--color-hover: var(--chat--color-secondary-shade-50);
	--chat--input--file--button--background: var(--chat--color-white);
	--chat--input--file--button--color: var(--chat--color--secondary);
	--chat--input--file--button--background-hover: var(--chat--input--file--button--background);
	--chat--input--file--button--color-hover: var(--chat--color-secondary-shade-50);
	--chat--files-spacing: 0.25rem;

	/* Body and Footer */
	--chat--body--background: var(--chat--color-light);
	--chat--footer--background: var(--chat--color-light);
	--chat--footer--color: var(--chat--color-dark);
}
</style>
</head>

<body>

<header>
    <h1>Izberite energetsko rešitev za vaš dom</h1>
    <p>Prihranite do 60% stroškov in povečajte udobje bivanja</p>
    <a href="#" class="btn">Oddaj povpraševanje</a>
</header>

<section>
    <h2>Naše storitve</h2>
    <div class="grid">
        <div class="card"><h3>Sončne elektrarne</h3></div>
        <div class="card"><h3>Toplotne črpalke</h3></div>
        <div class="card"><h3>Prezračevanje</h3></div>
        <div class="card"><h3>Klimatske naprave</h3></div>
    </div>
</section>

<footer>
    <p>Gatom d.o.o.</p>
</footer>

<!-- Chat Container -->
<div id="n8n-chat"></div>

<!-- Chat Script -->
<script type="module">
import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

createChat({
    webhookUrl: 'https://n8n.synthetic-minds.org/webhook/57f7cbf5-db6c-4087-ba6d-67a0ef9e2932/chat',

    webhookConfig: {
        method: 'POST',
        headers: {}
    },

    target: '#n8n-chat',
    mode: 'window',

    chatInputKey: 'chatInput',
    chatSessionKey: 'sessionId',
    loadPreviousSession: true,

    metadata: {},

    showWelcomeScreen: false,
    defaultLanguage: 'en',

    initialMessages: [
        'Kako vam lahko pomagam?',
        'Preko mene lahko tudi oddate povpraševanje 😊'
    ],

    i18n: {
        en: {
            title: 'Pozdravljeni! 👋',
            subtitle: "Sem AI asistent Gatom",
            footer: '',
            getStarted: 'Nov pogovor',
            inputPlaceholder: 'Vaše vprašanje...',
        },
    },

    enableStreaming: false,
});
</script>

</body>
</html>
